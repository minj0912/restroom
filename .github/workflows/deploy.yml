name: Deploy to GitHub Pages

on:
  push:
    branches: "main"

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Force Isolation and Build
        run: |
          # 1. 에러를 일으키는 옆방 폴더들을 서버에서 완전히 삭제 (우리 방만 남김)
          rm -rf artifacts/api-server
          rm -rf artifacts/facility-app
          rm -f pnpm-lock.yaml
          
          # 2. 우리 방으로 이동
          cd artifacts/mockup-sandbox
          
          # 3. 다른 설정 무시하고 강제로 설치 및 빌드
          pnpm install --no-frozen-lockfile
          pnpm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './artifacts/mockup-sandbox/dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4